name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages and apps
        # env-demo validates these at module load during `next build` page-data
        # collection. They are non-sensitive demo placeholders (see
        # apps/env-demo/.env.example), so we provide them inline to keep the
        # build deterministic instead of depending on optional repo secrets.
        env:
          DATABASE_URL: https://example.com/db
          OPEN_AI_API_KEY: sk-demo-key-min-8-chars
          NEXT_PUBLIC_API_URL: https://api.example.com
          NEXT_PUBLIC_APP_URL: https://app.example.com
          NEXT_PUBLIC_APP_NAME: env-demo
          PAYSTACK_SECRET_KEY: sk_test_1234567890
          BETTER_AUTH_SECRET: demo-secret-key-min-32-chars-long
          BETTER_AUTH_URL: https://auth.example.com
        run: pnpm build

      - name: Check
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test dist
        run: pnpm test:dist

      - name: Build cache demo
        run: pnpm demo:cache:build

  integration:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run integration tests
        if: env.UPSTASH_REDIS_REST_URL != '' && env.UPSTASH_REDIS_REST_TOKEN != ''
        run: pnpm --filter @g14o/core test:integration
