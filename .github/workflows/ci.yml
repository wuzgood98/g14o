name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ "$BRANCH_NAME" =~ ^(dependabot|renovate)/ ]]; then exit 0; fi
          if [[ ! "$BRANCH_NAME" =~ ^(feat|fix|docs|chore|refactor|test|ci|perf|build)/.+ ]]; then
            echo "::error::Branch must use prefix: feat/, fix/, docs/, chore/, etc."
            exit 1
          fi

      - uses: amannn/action-semantic-pull-request@2d952a1bf90a6a7ab8f0293dc86f5fdf9acb1915
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            perf
            build
          requireScope: false

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages and apps
        # env-demo validates these at module load during `next build` page-data
        # collection. They are non-sensitive demo placeholders (see
        # apps/env-demo/.env.example), so we provide them inline to keep the
        # build deterministic instead of depending on optional repo secrets.
        env:
          DATABASE_URL: https://example.com/db
          SQLITE_DATABASE_PATH: paystack-demo.sqlite
          OPEN_AI_API_KEY: sk-demo-key-min-8-chars
          NEXT_PUBLIC_API_URL: https://api.example.com
          NEXT_PUBLIC_APP_URL: https://app.example.com
          NEXT_PUBLIC_APP_NAME: demo
          PAYSTACK_SECRET_KEY: sk_test_1234567890
          BETTER_AUTH_SECRET: demo-secret-key-min-32-chars-long
          BETTER_AUTH_URL: https://auth.example.com
          UPSTASH_REDIS_REST_URL: https://example.com/redis
          UPSTASH_REDIS_REST_TOKEN: sk_test_1234567890
          OPENROUTER_API_KEY: sk_test_1234567890
          OPENROUTER_MODEL: gpt-4o-mini
          ENABLE_AI_CHAT: true
          REDIS_URL: redis://default:test-password@localhost:6379
        run: pnpm build

      - name: Check
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test dist
        run: pnpm test:dist

      - name: Build cache demo
        run: pnpm demo:cache:build

  integration:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run cache integration tests
        if: env.UPSTASH_REDIS_REST_URL != '' && env.UPSTASH_REDIS_REST_TOKEN != ''
        run: pnpm --filter @g14o/cache test:integration

      - name: Run ratelimit integration tests
        if: env.UPSTASH_REDIS_REST_URL != '' && env.UPSTASH_REDIS_REST_TOKEN != '' && env.REDIS_URL != ''
        run: pnpm --filter @g14o/ratelimit test:integration

      - name: Run ratelimit-nextjs integration tests
        if: env.UPSTASH_REDIS_REST_URL != '' && env.UPSTASH_REDIS_REST_TOKEN != '' && env.REDIS_URL != ''
        run: pnpm --filter @g14o/ratelimit-nextjs test:integration

      - name: Run ratelimit-hono integration tests
        if: env.UPSTASH_REDIS_REST_URL != '' && env.UPSTASH_REDIS_REST_TOKEN != '' && env.REDIS_URL != ''
        run: pnpm --filter @g14o/ratelimit-hono test:integration

      - name: Run ratelimit-express integration tests
        if: env.UPSTASH_REDIS_REST_URL != '' && env.UPSTASH_REDIS_REST_TOKEN != '' && env.REDIS_URL != ''
        run: pnpm --filter @g14o/ratelimit-express test:integration

      - name: Run paystack integration tests
        if: env.PAYSTACK_SECRET_KEY != ''
        run: pnpm --filter @g14o/paystack test:integration

      - name: Run paystack-better-auth integration tests
        if: env.PAYSTACK_SECRET_KEY != ''
        run: pnpm --filter @g14o/paystack-better-auth test:integration
